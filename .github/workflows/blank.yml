name: Sync Docker Images to Aliyun ACR

on:
  # 手动触发工作流（推荐用于测试）
  workflow_dispatch:
  # 推送到main分支时触发
  push:
    branches: [ main ]
  # 定时触发（可选），每天UTC 18:00（北京时间 02:00）
  schedule:
    - cron: '0 18 * * *'

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：设置Docker Buildx（可选，但推荐用于多架构支持）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 步骤 2：登录到阿里云容器镜像服务 (ACR)
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }} # 例如：registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USER }} # 您的阿里云 AccessKey ID
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }} # 您的阿里云 AccessKey Secret

      # 步骤 3：拉取、重打标签并推送镜像
      - name: Pull, Retag and Push Images
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          NAMESPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
        run: |
          echo "开始同步镜像到阿里云ACR..."
          echo "仓库地址: $ALIYUN_REGISTRY"
          echo "命名空间: $NAMESPACE"
          
          # 检查必要的环境变量
          if [ -z "$ALIYUN_REGISTRY" ]; then
            echo "错误: ALIYUN_REGISTRY 未设置"
            exit 1
          fi
          
          if [ -z "$NAMESPACE" ]; then
            echo "错误: NAMESPACE 未设置"
            exit 1
          fi
          
          # 定义需要同步的镜像列表
          # 格式: "源镜像地址:标签"
          images=(
            "ghcr.io/dependabot/dependabot-updater-core:latest"
            "wantcat/trendradar-mcp:latest"
            "wantcat/trendradar:latest"
          )

          for source_image in "${images[@]}"; do
            echo "=== 处理镜像: $source_image ==="
            
            # 从源镜像地址中提取镜像名称
            # 处理不同格式的镜像名称
            if [[ $source_image == *"/"* ]]; then
              # 如果镜像地址包含路径分隔符 /
              image_name=$(echo "$source_image" | awk -F'/' '{print $NF}' | awk -F':' '{print $1}')
            else
              # 如果镜像地址是简单格式
              image_name=$(echo "$source_image" | awk -F':' '{print $1}')
            fi
            
            # 构造目标镜像标签
            target_image_tag="${ALIYUN_REGISTRY}/${NAMESPACE}/${image_name}:latest"
            
            echo "源镜像: $source_image"
            echo "目标镜像: $target_image_tag"
            
            # 拉取镜像
            echo "正在拉取镜像..."
            docker pull "$source_image" || {
              echo "警告: 拉取镜像 $source_image 失败，跳过此镜像"
              continue
            }
            
            # 为镜像重打阿里云标签
            echo "正在重打标签..."
            docker tag "$source_image" "$target_image_tag"
            
            # 推送镜像到阿里云
            echo "正在推送到阿里云ACR..."
            docker push "$target_image_tag" || {
              echo "错误: 推送镜像 $target_image_tag 失败"
              exit 1
            }
            
            echo "✓ 成功推送: $target_image_tag"
            echo ""
          done
          
          echo "所有镜像同步完成!"
